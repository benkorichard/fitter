name: Build and Push Docker Images

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Run API smoke tests
        working-directory: api
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build fitter-api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false

      - name: Build fitter-web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false

  release:
    runs-on: ubuntu-latest
    needs: [test-api, build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push fitter-api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            benkorichard/fitter-api:${{ steps.meta.outputs.tag }}
            benkorichard/fitter-api:latest

      - name: Build and push fitter-web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            benkorichard/fitter-web:${{ steps.meta.outputs.tag }}
            benkorichard/fitter-web:latest
