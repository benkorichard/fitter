services:
  api:
    build: ./api
    volumes:
      - ./api:/app
      - fitter-data:/data
    environment:
      DATABASE_URL: sqlite:////data/fitter.db
    restart: unless-stopped

  web:
    build: ./web
    environment:
      API_HOST: ${API_HOST:-api}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  fitter-data:
